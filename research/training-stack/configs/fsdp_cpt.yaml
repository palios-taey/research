compute_environment: LOCAL_MACHINE
debug: false
distributed_type: FSDP
downcast_bf16: 'no'
fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  # PERF-1: BACKWARD_PRE already set — overlaps all-gather with backward computation.
  # IBM Research measured ~2x GPU utilization improvement from comm-compute overlap.
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_cpu_ram_efficient_loading: true
  # PERF-2: Enable forward prefetch — overlaps next-layer all-gather with current-layer
  # forward computation. Measured 10-15% speedup on multi-node FSDP runs.
  # Memory cost: ~1 extra FSDP unit worth of params in-flight (~1.7GB for 35B/4-node).
  fsdp_forward_prefetch: true
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sync_module_states: true
  # PERF-3: Wrap all three expert-related classes — without Qwen3_5MoeExperts and
  # Qwen3_5MoeSparseMoeBlock, FSDP only wraps at decoder layer level. The 256 experts
  # stay replicated within each FSDP unit instead of being sharded, costing ~57GB extra
  # per node. With proper wrapping, experts are sharded across ranks.
  # Format: comma-separated list of class names (Accelerate 1.13 supports this).
  fsdp_transformer_layer_cls_to_wrap: Qwen3_5MoeDecoderLayer,Qwen3_5MoeExperts,Qwen3_5MoeSparseMoeBlock
  fsdp_use_orig_params: true
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 4
num_processes: 4
rdzv_backend: static
same_network: true
use_cpu: false
